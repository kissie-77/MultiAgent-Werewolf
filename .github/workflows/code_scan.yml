name: Code Scanning

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: GitLeaks Scanning
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trufflehog Scanning
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          extra_args: --results=verified,unknown

  codeql-scanning:
    name: CodeQL Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.32.6
        with:
          languages: python

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4.32.6

  trivy-scanning:
    name: Trivy Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: HIGH,CRITICAL
          skip-setup-trivy: true

      - name: Trivy table (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: 1
          severity: CRITICAL
          skip-setup-trivy: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4.32.6
        with:
          sarif_file: trivy-results.sarif
