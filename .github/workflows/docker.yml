name: Docker

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"
      - "src/**"
      - "frontend/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"
      - "src/**"
      - "frontend/**"

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_images:
    name: Build API and Web images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: llm-werewolf-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: llm-werewolf-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
