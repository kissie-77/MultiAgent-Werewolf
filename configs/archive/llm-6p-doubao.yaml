# 6 人局 — 火山方舟 Doubao-Seed-2.0-pro（OpenAI 兼容接口）
# ARK_API_KEY、ARK_EP 放在 .env，勿写入本文件
language: zh-CN
agent_backend: agentscope
default_plan: default
# 信念矩阵采集：6 人局与座位数对齐，全并发；需配合 AGENT_SERIAL_DELAY_SECONDS=0
vote_intention_concurrency: 6
day_timeout: 600
vote_timeout: 120
night_timeout: 90

doubao_base: &doubao_base https://ark.cn-beijing.volces.com/api/v3

players:
  - name: 玩家1
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY

  - name: 玩家2
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY

  - name: 玩家3
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY

  - name: 玩家4
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY

  - name: 玩家5
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY

  - name: 玩家6
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY
