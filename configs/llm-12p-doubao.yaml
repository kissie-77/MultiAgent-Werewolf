# 12 人标准局 — 火山方舟 Doubao-Seed-2.0-pro（OpenAI 兼容接口）
# ARK_API_KEY、ARK_EP 放在 .env，勿写入本文件
language: zh-CN
agent_backend: agentscope
default_plan: default
vote_intention_concurrency: 12
day_timeout: 180
vote_timeout: 180
night_timeout: 120

doubao_base: &doubao_base https://ark.cn-beijing.volces.com/api/v3

