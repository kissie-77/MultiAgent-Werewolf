    api_key_env: DEEPSEEK_API_KEY
  - name: Player4
    model: *ds_model
    base_url: *ds_base
    api_key_env: DEEPSEEK_API_KEY
  - name: Player5
    model: *ds_model
    base_url: *ds_base
    api_key_env: DEEPSEEK_API_KEY
  - name: Player6
    model: *ds_model
