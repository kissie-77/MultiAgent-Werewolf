# 6 人局 — DeepSeek OpenAI 兼容接口（快速验证用）
language: zh-CN
agent_backend: agentscope
default_plan: default

ds_model: &ds_model deepseek-v4-flash
ds_base: &ds_base https://api.deepseek.com/v1

players:
