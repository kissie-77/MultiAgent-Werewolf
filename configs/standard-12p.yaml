# Standard 12-player match board (Volcengine Ark / Doubao)
# Official board size — roles auto-dealt from player count.
# Set ARK_API_KEY and ARK_EP in .env (or via web settings).
language: zh-CN
agent_backend: agentscope
default_plan: default
vote_intention_concurrency: 12

doubao_base: &doubao_base https://ark.cn-beijing.volces.com/api/v3

players:
  - name: Player1
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY
  - name: Player2
    model_env: ARK_EP
    base_url: *doubao_base
    api_key_env: ARK_API_KEY
