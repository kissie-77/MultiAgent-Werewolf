server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 安全响应头 ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip 压缩 ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/truetype
        font/opentype;

    # ── Brotli 压缩（如果安装了 ngx_brotli 模块）───────────────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── 静态资源：长缓存（Vite 构建产物带内容哈希）──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # ── API 反代到后端（容器内服务名 api，端口 8000）────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;

        # SSE 支持（Server-Sent Events）
        proxy_cache off;
        proxy_redirect off;
    }

    # ── SSE 专用路径（如果需要单独处理）────────────────────────────────────
    location /api/stream {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── 健康检查端点直透 ───────────────────────────────────────────────────
    location /ready {
        proxy_pass http://api:8000/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── SPA fallback：所有非文件路径回到 index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 禁止访问隐藏文件 ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── 日志格式优化 ───────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;
}
