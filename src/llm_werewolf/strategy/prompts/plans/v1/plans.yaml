    elder: 谨慎带队，避免被投出（会废掉全场神职技能），必须深度思考并输出思考内容
    knight: 证据充分时决斗，整局仅一次机会，必须深度思考并输出思考内容
    magician: 择机交换两人身份打乱狼刀，必须深度思考并输出思考内容
    cupid: 首夜连线制造阵营对立，关注恋人存活，必须深度思考并输出思考内容
    raven: 夜间诅咒高狼信目标，次日引导归票，必须深度思考并输出思考内容
    graveyard_keeper: 查验死者身份收缩狼坑，必须深度思考并输出思考内容
    thief: 首夜谨慎选身份，选后利用技能优势，必须深度思考并输出思考内容
    lover: 隐藏恋人关系，争取与恋人共同存活，必须深度思考并输出思考内容
