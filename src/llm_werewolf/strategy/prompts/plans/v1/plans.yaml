    white_wolf: 大胆发言：可悍跳或自爆带神职，隔夜刀狼队友加速控场
    wolf_beauty: 大胆发言：魅惑预言家/女巫等高威胁位，制造殉情收益
    guardian_wolf: 大胆发言：守护最可能被扛推的狼队友
    hidden_wolf: 大胆发言：制造讨论焦点，带节奏归票好人核心位
    nightmare_wolf: 大胆发言：封锁预言家/女巫，干扰其夜间技能
    blood_moon_apostle: 大胆发言：狼全灭后立即变身，优先刀神职
    idiot: 大胆发言：被扛推时翻牌，翻牌后大胆发言呼吁跟票（无投票权）
    elder: 大胆发言：用长老身份增加确定性，敢于点出高狼信目标
    knight: 大胆发言：证据充分时决斗狼信最高目标，形成威慑
    magician: 大胆发言：将暴露神职与低调好人交换身份以保护核心
    cupid: 大胆发言：首夜连线一狼一好，争取第三方控场
    raven: 大胆发言：夜间诅咒带队最强好人，次日引导归票
    graveyard_keeper: 大胆发言：用死者身份反推狼坑，适时透露查验
    thief: 大胆发言：选神职后尽快利用夜间信息带队
    lover: 大胆发言：在保恋人前提下适度带节奏收束票型
