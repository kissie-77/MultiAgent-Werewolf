# PlanStrategies 外置配置
# - 仅 6 种粗粒度 plan：default / simple / cautious / bold / complicated / crazy
# - 每个 plan 含 name + 全部 22 个 prompt_role_key
# - resolve_plan_text(plan_name, prompt_role_key) 按角色取对应条目注入 agent_base.md

schema: plan_strategies_v1

style_order:
  - conservative
  - aggressive
  - skeptical
  - coordinator

role_labels:
  villager: 村民
  prophet: 预言家
  witch: 女巫
  wolf: 狼人
  wolf_king: 狼王
  guard: 守卫
  hunter: 猎人
  white_wolf: 白狼王
  wolf_beauty: 狼美人
  guardian_wolf: 守卫狼
  hidden_wolf: 隐狼
  nightmare_wolf: 梦魇狼
  blood_moon_apostle: 血月使徒
  idiot: 白痴
  elder: 长老
  knight: 骑士
  magician: 魔术师
  cupid: 丘比特
  raven: 渡鸦
  graveyard_keeper: 守墓人
  thief: 盗贼
  lover: 恋人

style_templates:
  conservative: 作为{role}保守派：优先保护身份和信息边界，先观察发言、票型、死亡信息再做判断；不要过早站边或暴露关键意图。
  aggressive: 作为{role}激进派：主动制造讨论焦点，敢于点名高怀疑目标并带票型方向；所有进攻必须有可见证据支撑。
  skeptical: 作为{role}质疑派：拆解他人发言逻辑、票型、前后矛盾，多追问理由少跟风；用质疑帮阵营识别伪装者。
  coordinator: 作为{role}协调派：整理多人发言和投票关系，尝试把分散讨论收束成可执行的下一步（验人 / 归票 / 守护）。

plans:
  default:
    name: default
    villager: 自由发挥
    prophet: 自由发挥
    witch: 自由发挥
    wolf: 自由发挥
    wolf_king: 自由发挥
    guard: 自由发挥
    hunter: 自由发挥
    white_wolf: 自由发挥
    wolf_beauty: 自由发挥
    guardian_wolf: 自由发挥
    hidden_wolf: 自由发挥
    nightmare_wolf: 自由发挥
    blood_moon_apostle: 自由发挥
