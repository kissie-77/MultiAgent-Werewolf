    elder: 自由发挥
    knight: 自由发挥
    magician: 自由发挥
    cupid: 自由发挥
    raven: 自由发挥
    graveyard_keeper: 自由发挥
    thief: 自由发挥
    lover: 自由发挥
  simple:
    name: simple
    villager: 简化发言：只给关键判断和归票倾向，不展开长逻辑链
    prophet: 简化发言：跳身份后报查验结果即可，推理从简
    witch: 简化发言：用药决策后一两句说明，不展开完整心路
    wolf: 简化发言：跟狼队票型归票，少展开攻防长逻辑
    wolf_king: 简化发言：跟狼队节奏，不额外暴露狼王信息
    guard: 简化发言：不透露守护路径，白天只做必要推理
    hunter: 简化发言：保持低调，不主动暴露枪口威慑
    white_wolf: 简化发言：与普通狼人一致，不暴露隔夜刀狼节奏
    wolf_beauty: 简化发言：低调发言，不暴露魅惑对象
    guardian_wolf: 简化发言：与普通狼人一致，不暴露守护队友行为
    hidden_wolf: 简化发言：低调划水，少做强判断
    nightmare_wolf: 简化发言：与普通狼人一致，不暴露封锁对象
    blood_moon_apostle: 简化发言：按好人视角潜伏，少表态
    idiot: 简化发言：被扛推时翻牌一句说明即可
    elder: 简化发言：不主动带队，被问时简短回应
    knight: 简化发言：保持低调，不主动暴露决斗技能
    magician: 简化发言：不主动暴露交换身份能力
    cupid: 简化发言：不主动暴露连线关系
    raven: 简化发言：不主动暴露夜间诅咒行为
    graveyard_keeper: 简化发言：不主动透露死者查验结果
    thief: 简化发言：选完身份后低调观察，少表态
    lover: 简化发言：不主动暴露恋人关系
  cautious:
    name: cautious
    villager: 谨慎发言：只问问题不踩人，先观察再站队
    prophet: 谨慎发言：被扛推风险升高前不主动报查杀
    witch: 谨慎发言：白天保持中立，不主动跳女巫
    wolf: 谨慎发言：模拟好人视角，踩人留余地不过度攻击
    wolf_king: 谨慎发言：与普通狼人一致，不暴露狼王身份
    guard: 谨慎发言：不暴露守护逻辑，避免被反推刀口
    hunter: 谨慎发言：前期不暴露身份，被扛推时再亮枪威慑
    white_wolf: 谨慎发言：与普通狼人一致，不暴露白狼王技能
    wolf_beauty: 谨慎发言：白天低调，不主动暴露魅惑能力
    guardian_wolf: 谨慎发言：与普通狼人一致，不暴露守卫狼身份
    hidden_wolf: 谨慎发言：用主观措辞推理，不暴露夜间信息
    nightmare_wolf: 谨慎发言：与普通狼人一致，不暴露封锁能力
    blood_moon_apostle: 谨慎发言：按好人视角潜伏，不暴露狼队站边
    idiot: 谨慎发言：前期不跳白痴，被投票出局时再翻牌
    elder: 谨慎发言：前期不跳长老，归票基于公开逻辑（被投出会废神职技能）
    knight: 谨慎发言：证据不足不决斗，不主动暴露骑士身份
    magician: 谨慎发言：选好时机再交换身份，不提前暴露能力
    cupid: 谨慎发言：白天不暴露丘比特身份
    raven: 谨慎发言：白天不暴露渡鸦身份
    graveyard_keeper: 谨慎发言：不在白天过早透露死者查验结果
    thief: 谨慎发言：选完身份后低调观察，再决定是否跳身份
    lover: 谨慎发言：前期不暴露恋人关系，关注双方存活
  bold:
