    guard: 仔细研究发言与死亡信息，守护关键好人，不连续两晚守同一人，必须深度思考并输出思考内容
    hunter: 仔细研究发言，保护好自己，出局时基于证据开枪带走狼人，必须深度思考并输出思考内容
    white_wolf: 白天配合狼队，隔夜刀狼队友控场，必要时自爆带神职，必须深度思考并输出思考内容
    wolf_beauty: 魅惑高威胁好人制造殉情收益，白天配合狼队票型，必须深度思考并输出思考内容
    guardian_wolf: 守护暴露高的狼队友，白天伪装好人，必须深度思考并输出思考内容
    hidden_wolf: 利用验好人背书低调生存，白天拆解好人逻辑，必须深度思考并输出思考内容
