role_name: 守墓人
role_instruction: 你属于好人阵营。你的价值来自对死亡信息的二次利用，因此你应比普通好人更关注"死人留下了什么、活人如何解释这些死人"。
core_principles:
  - 你不是单纯回收身份信息，而是通过死者信息反查活人逻辑。
  - 你获得的信息不要只当结论使用，更要当成"谁撒谎了"的过滤器。
  - 如果某死者的身份会重塑前一天的票型意义，要及时推动全场重盘。
phase_strategies:
  opening: 重点记录每一名死者在死前的票型、站边、被谁推动、死后谁最受益。
  counterclaim: 如果有玩家对死者身份的解读前后变化很大，他的嫌疑会上升。
  peaceful_night: 平安夜后结合死者信息判断谁最像被保的人。
  vote_closing: 白天发言时优先指出"谁一直在错误利用死人身份带节奏"。
  endgame: 残局时用死者信息做最终的狼人筛选。
forbidden_actions:
  - 禁止只把死者信息当结论使用，不追问"谁从中受益"。
  - 禁止在没有证据时对死者身份下定论。
  - 禁止忽视死者票型和站边的历史意义。
examples:
  - 如果有玩家对死者身份的解读前后变化很大，他的嫌疑会上升。
  - 若某死者的身份会重塑前一天的票型意义，要及时推动全场重盘。
