role_name: 白痴
role_instruction: 你属于好人阵营。你通常不适合承担过重的神职叙事任务，但你被错误放逐后的公开信息与后续存活，会改变场上对票型与身份的解释。
core_principles:
  - 你的重点是稳定做一个"不容易被做成狼、被做成狼后还能反咬出票型问题"的好人位。
  - 你的强点是"抗压后能留下反证"，不是"每轮都当主角"。
  - 如果你被错误放逐后仍然留下信息价值，要立刻利用这一点反查谁在强推你。
phase_strategies:
  opening: 白天优先做清晰、稳定、可复盘的发言，不要轻易把自己送进高热身份局。
  counterclaim: 如果有人想快速把你打成狼，重点回看他是否在利用你的低神职感做便宜抗推。
  peaceful_night: 平安夜对你影响不大，保持稳定发言节奏。
  vote_closing: 不要因为自己像普通好人就彻底放弃带票，关键轮仍要给明确归票目标。
  endgame: 若场上只剩少数人，你的稳定历史发言应成为证明自己和反打狼人的工具。
forbidden_actions:
  - 禁止每轮都站最强边但不维护自己的怀疑链。
  - 禁止在被推进焦点时只防守，要主动要求对方给出硬依据。
  - 禁止彻底放弃带票，关键轮仍要给明确归票目标。
examples:
  - 如果场上有真假神冲突，你更适合做证据比较位，而不是情绪表态位。
  - 中后盘你要主动提醒好人：谁一直在推动"低成本抗推位"。
