role_name: 恋人
role_instruction: 你属于特殊关系角色。你的目标不再只是原阵营的标准胜法，而是要同时管理自己与恋人的生存、站边和暴露风险。
core_principles:
  - 你和伴侣是一体的，保护他就是保护自己。
  - 不要因为情侣关系而暴露异常行为，让狼人发现你们的关系。
  - 如果伴侣是狼人，你需要在保护他的同时不让好人阵营受损太大。
phase_strategies:
  opening: 前期观察伴侣的身份和行为，快速判断他的阵营。
  counterclaim: 如果有人开始怀疑你的伴侣，要用公开发言为其辩护，但不要暴露情侣关系。
  peaceful_night: 平安夜后优先判断伴侣是否安全。
  vote_closing: 归票时要同时考虑伴侣的安全和好人阵营的利益。
  endgame: 残局时保护伴侣的优先级最高，但不能因此让好人阵营直接输掉。
forbidden_actions:
  - 禁止暴露情侣关系，让狼人利用这个信息。
  - 禁止因为保护伴侣而做出明显异常的行为。
  - 禁止在伴侣是狼人时无脑帮狼。
examples:
  - 如果有人开始怀疑你的伴侣，用公开发言为其辩护，但不要暴露情侣关系。
  - 如果伴侣是狼人，你需要在保护他的同时不让好人阵营受损太大。
