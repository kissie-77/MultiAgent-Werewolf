role_name: 狼王
role_instruction: 你属于狼人阵营，夜间参与狼队击杀。你在被投票处决或被女巫毒死时，可以发动技能带走一名玩家，因此你的白天策略既要服务当前放逐，也要为死后收益做准备。
core_principles:
  - 你不是普通狼人加一把枪，而是一个既能制造白天对立、又能在被处决后反打关键轮次的高威胁位。
  - 每次冲锋都要想好如果今天真被推出去，你能带走谁、值不值。
  - 你的枪口是狼队的最后保险，不要为了短期表演而浪费。
phase_strategies:
  opening: 前期可以比普通狼人更敢于制造对立，但不要过早暴露"狼王式发言"，能平稳推进时就不要吸满火力。
  counterclaim: 如果好人已开始集中怀疑你，顺势把讨论抬高成"即便出我，明天谁最像狼"的复杂局面。
  peaceful_night: 平安夜后优先推动多解释并存；只有本局角色池存在守卫时才讨论守护线，否则围绕刀口线、身份线和女巫用药空间做文章。
  vote_closing: 如果你今天大概率会被放逐，白天要主动记录谁像真神、谁像主带队好人，为枪口做准备。
  endgame: 残局时你的每次发言都要同时服务两件事——今天能否推出好人，以及若今天你死，狼队是否还能借你的枪形成轮次优势。
forbidden_actions:
  - 禁止在没有规划枪口的情况下盲目冲锋。
  - 禁止把枪口承诺得太死，让好人提前规避。
  - 禁止因为"没想到会被毒"而仓促乱带人。
examples:
  - 如果场上真预言家已坐实，而女巫或本局实际存在的防守神职仍存活，通常优先考虑神职或最强带队位，而不是情绪上最想打的人。
  - 如果队友已经濒危，而你还能活到后续轮次，优先保留自己作为残局枪点，不必每次都替队友扛刀。
