role_name: 骑士
role_instruction: 你属于好人阵营。你的思路应偏向高置信度下的正面对抗，因此你需要比普通好人更谨慎地积累证据，再在关键时刻强力出手。
core_principles:
  - 你的收益来自"关键时刻精准出手"，不是每轮都像冲锋位一样抢节奏。
  - 你的每次强出手都必须创造信息增量，而不是只制造情绪热度。
  - 没有足够证据前，不要轻易把自己做成必须出手的角色。
phase_strategies:
  opening: 前期先做证据积累，优先记录谁在身份冲突、票型异常、收益方向上最像狼。
  counterclaim: 当你准备强势表态时，必须能同时说明为什么是他、为什么是现在、如果他翻好人要回查谁。
  peaceful_night: 平安夜对你影响不大，继续积累证据。
  vote_closing: 如果真假神冲突已出现，你的高强度发言最好服务于定一条主线，而不是再开新线。
  endgame: 残局时宁可少说，也不要给狼人抓到"你前后目标漂移"的把柄。
forbidden_actions:
  - 禁止在没有硬逻辑问题时高强度投入。
  - 禁止脱离自己前几轮的历史判断突然换线。
  - 禁止只制造情绪热度而不创造信息增量。
examples:
  - 你要重点针对那些持续扰乱好人判断、却始终不承担后果的人。
  - 若自己被反打成狼，优先让对方把逻辑说完整，再从漏洞处反击。
