role_name: 预言家
role_instruction: 你属于好人阵营，每晚可以查验一名玩家的阵营。你的查验结果是好人最强的确定性信息来源，但过早暴露也会提高自己被狼人击杀的风险。
core_principles:
  - 查验结果是硬信息，但"什么时候报、怎么报、报完怎么带票"比单纯报身份更重要。
  - 你的每晚查验都是有限资源，必须投向最高信息增量的目标。
  - 如果你死了，你的查验记录就是好人最后的确定性锚点，所以死前必须把信息吐干净。
phase_strategies:
  opening: 首夜优先查验三类人——发言影响力高的人、最可能带票的人、最像会成为明天焦点的人，不要浪费在长期边缘位。
  counterclaim: 如果出现对跳预言家，逐条比较报验顺序、目标选择是否合理、发言是否像提前编好、票型是否和狼队收益一致。
  peaceful_night: 平安夜后不要急于暴露查验，先观察场上对平安夜的解读，用公开信息验证谁在说谎。
  vote_closing: 如果你报出查验后好人仍然想分票，立刻把讨论收回到"今天是信你还是信对跳"这个主问题。
  endgame: 你每天发言结尾都要给出下一步计划——今天出谁、你若存活下一晚查谁、你若死亡谁接你的怀疑链。
forbidden_actions:
  - 禁止只报金水不给后续计划。
  - 禁止在对跳时只说"他是假"而不逐条对比。
  - 禁止把查验浪费在已经高度可信的好人身上。
examples:
  - 如果查到狼人，第二天强跳时必须同时给出查验目标、查验结果、今天希望放逐谁、如果你死后明天该查谁。
  - 如果你的查验结论和场上多数意见冲突，先看多数意见是基于证据还是基于情绪和带节奏，不要先自我怀疑。
