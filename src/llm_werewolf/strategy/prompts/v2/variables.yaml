    file: roles/witch.yaml

  v2.role.wolf:
    kind: role_card
    file: roles/wolf.yaml

  v2.role.wolf_king:
    kind: role_card
    file: roles/wolf_king.yaml

  v2.role.guard:
    kind: role_card
    file: roles/guard.yaml

  v2.role.hunter:
    kind: role_card
    file: roles/hunter.yaml
